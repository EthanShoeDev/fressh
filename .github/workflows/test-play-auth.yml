name: Test Play Auth (WIF)

# Manual smoke test for the Google Play auth chain: GitHub OIDC token ->
# Workload Identity Federation -> impersonate fastlane-supply -> Play API.
# Uploads nothing; fastlane's validate_play_store_json_key just authenticates.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate Play API auth
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup (Nix devShell, no bun install)
        uses: ./.github/actions/setup
        with:
          install: 'false'

      - name: Google Cloud auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/222063936101/locations/global/workloadIdentityPools/github/providers/github-actions
          service_account: fastlane-supply@fressh-mobile-ssh.iam.gserviceaccount.com

      - name: Validate Play Store credentials
        working-directory: apps/mobile
        run: fastlane run validate_play_store_json_key json_key:"$GOOGLE_APPLICATION_CREDENTIALS"
