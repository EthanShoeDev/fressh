name: Canary npm (terminal)

# Publish a canary of @fressh/react-native-terminal to the `canary` dist-tag
# (provenance, OIDC) via the reusable release-npm.yml. Consumers: `bun add
# @fressh/react-native-terminal@canary`.
#
# Snapshot mode only versions packages that have a PENDING changeset, so run this
# when you have unreleased changesets you want to dogfood. Do the manual 0.1.0
# bootstrap publish FIRST — a never-published package ignores --tag and the first
# canary would land on `latest`.
on:
  workflow_dispatch:
  push:
    branches: [canary]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: ./.github/workflows/release-npm.yml
    with:
      snapshot: true
      npm-tag: canary
    secrets: inherit
    permissions:
      contents: read
      id-token: write
