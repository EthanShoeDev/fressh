name: Build Mobile

# Track A5: build on GitHub Actions runners using our Nix devShell, invoking
# `eas build --local` via turbo. This workflow is a THIN CALLER — all of the
# codegen/native-build ordering lives in turbo (turbo build:android / build:ios).
# See docs/projects/ci-building-and-releasing.md ("What we're doing & why").
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [android, ios, all]
        default: android
  push:
    tags: ["@fressh/mobile@*"] # the changesets release tag

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # gh release upload

jobs:
  android:
    name: Android
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["android","all"]'), github.event.inputs.platform)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix Store
        uses: nix-community/cache-nix-action@main
        with:
          primary-key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}

      - name: Load devShell environment
        uses: nicknovitski/nix-develop@main
        with:
          arguments: .#default

      - uses: actions/cache@v3
        name: Setup Bun cache
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-

      - run: bun install --frozen-lockfile

      # turbo runs the terminal package's codegen (ubrn + nitrogen) + native .so,
      # then `eas build --local` for the app. In CI, secrets come from GitHub
      # Secrets as env vars, so force the env:// provider (no OpenBao / global
      # config in CI; local dev uses the ["env","bao"] chain instead).
      - name: Build (turbo -> eas build --local)
        run: secretspec run -f apps/mobile/secretspec.toml --provider env:// --profile production -- bunx turbo build:android --filter @fressh/mobile
        env: # GitHub Secrets -> env:// provider, read by secretspec
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "$GITHUB_REF_NAME" apps/mobile/build/fressh-android.aab --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios:
    name: iOS
    if: >-
      github.event_name == 'push' ||
      contains(fromJSON('["ios","all"]'), github.event.inputs.platform)
    runs-on: macos-15 # iOS Rust build + xcframework + signing need macOS
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix Store
        uses: nix-community/cache-nix-action@main
        with:
          primary-key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}

      - name: Load devShell environment
        uses: nicknovitski/nix-develop@main
        with:
          arguments: .#default

      - uses: actions/cache@v3
        name: Setup Bun cache
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-store-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-build-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-build-

      - run: bun install --frozen-lockfile

      - name: Build (turbo -> eas build --local)
        run: secretspec run -f apps/mobile/secretspec.toml --provider env:// --profile production -- bunx turbo build:ios --filter @fressh/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload artifact to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "$GITHUB_REF_NAME" apps/mobile/build/fressh-ios.ipa --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
