name: Check
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # The terminal package vendors forked alacritty/crossfont as git
          # submodules; cargo:build fails without them.
          submodules: recursive

      - name: Setup (Nix devShell + deps)
        uses: ./.github/actions/setup

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key:
            ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.job }}-${{
            github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ github.ref_name }}-${{ github.job }}-
            ${{ runner.os }}-turbo-${{ github.ref_name }}-
            ${{ runner.os }}-turbo-

      - run: bunx turbo lint:check

