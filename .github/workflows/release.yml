# The SINGLE entry point for every npm publish of @fressh/react-native-terminal, so npm's
# one-per-package trusted publisher (which matches the top-level CALLER workflow) is satisfied
# by registering ONLY this file. Three release lines, all routed through reusable release-npm.yml:
#
#  - STABLE  (push to `main`)        -> changesets two-mode `version` job:
#       * pending changesets  -> opens/updates the "Version Packages" PR (nothing else runs)
#       * none (that PR merged) -> tags + GitHub Release, then `build` submits the app to test
#         channels and `publish-terminal` publishes to npm `latest`.
#  - RC      (push to `prerelease`)  -> same two-mode flow in changesets PRE MODE -> `rc` dist-tag.
#  - CANARY  (dispatch / push `canary`) -> `publish-terminal-canary`: throwaway snapshot
#       (0.0.0-canary-<commit>) to the `canary` dist-tag; skips the version job entirely.
name: Version & Release
# Make the mode readable from the Actions list without clicking in: merging the
# Version Packages PR produces a head commit that is either the squashed
# "chore: version packages" or a merge of changeset-release/main -> that run
# tags + releases; every other push just updates the PR.
run-name: "${{ ((github.event_name == 'workflow_dispatch') || (github.ref_name == 'canary')) && 'Publish npm canary (snapshot)' || ((startsWith(github.event.head_commit.message, 'chore: version packages') || contains(github.event.head_commit.message, 'changeset-release/main')) && 'Cut release (tag + build + publish)' || 'Update Version Packages PR') }}"
on:
  push:
    # main      -> stable release to the `latest` npm dist-tag + the app's test channels.
    # prerelease -> changesets PRE MODE (carries .changeset/pre.json): x.y.z-rc.N to the `rc`
    #               dist-tag + the app's internal channels. NEVER merge pre.json to main
    #               (it would put the whole monorepo in pre mode).
    # canary    -> throwaway snapshot (0.0.0-canary-<commit>) to the `canary` dist-tag.
    branches: [main, prerelease, canary]
  # Manual canary: Actions -> "Version & Release" -> Run workflow. Same snapshot publish as a
  # push to `canary`. Needs a PENDING changeset (snapshot only versions changed packages).
  workflow_dispatch:
    inputs:
      canary:
        description: Publish a canary (snapshot) of @fressh/react-native-terminal to the `canary` dist-tag. Requires a pending changeset.
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Version PR (changesets) or tag release
    # Stable/rc two-mode flow only. Canary pushes/dispatches skip this entirely and go
    # straight to publish-terminal-canary below.
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'prerelease')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Exposed to the `build` job below: the exact @fressh/mobile tag if (and only
    # if) the mobile app was released this run. Empty otherwise -> no build.
    outputs:
      mobile-tag: ${{ steps.mobile.outputs.tag }}
      terminal-released: ${{ steps.terminal.outputs.released }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup (Nix devShell + deps)
        uses: ./.github/actions/setup

      # Canonical changesets two-mode action:
      #  - changesets present  -> `version` opens/updates the "Version Packages" PR
      #    (bumps package.json, rewrites CHANGELOG.md).
      #  - no changesets (that PR just merged) -> `publish` runs `changeset tag`,
      #    which creates+pushes the git tag @fressh/mobile@<version> and a GitHub
      #    Release, and sets outputs.published=true. We use `tag` not `publish`
      #    because apps/mobile is private and never goes to npm
      #    (privatePackages.tag:true allows tagging it).
      # The `build` job below then builds the app IN THIS SAME RUN and attaches the
      # artifact to that Release. (We can't trigger build-mobile.yml off the tag
      # push because GITHUB_TOKEN-pushed tags don't start new workflow runs.)
      - name: Version (PR) or Tag (release)
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run tag
          commit: 'chore: version packages'
          title: 'Version Packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # A release can tag several packages at once (privatePackages.tag + the
      # updateInternalDependencies cascade), so pick out the @fressh/mobile tag
      # specifically. Empty if the mobile app wasn't part of this release.
      - name: Determine mobile release tag
        id: mobile
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          tag=$(jq -r '.[] | select(.name=="@fressh/mobile") | "@fressh/mobile@" + .version' <<<"$PUBLISHED" | head -n1)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Did this release version the PUBLIC terminal package? Drives the npm publish
      # job below, independently of the app build.
      - name: Determine terminal release
        id: terminal
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          released=$(jq -r 'any(.[]; .name=="@fressh/react-native-terminal")' <<<"$PUBLISHED")
          echo "released=$released" >> "$GITHUB_OUTPUT"

  # When the Version PR merge produced a release (published==true), build the app
  # and attach it to the freshly-created GitHub Release, then submit to the store
  # test channels (Play internal track / TestFlight). Calls the reusable
  # build-mobile workflow so the build recipe lives in exactly one place.
  # Public release stays a manual step: the ship-prod.yml promote button.
  build:
    name: Build, attach & submit to test channels
    needs: version
    if: needs.version.outputs.mobile-tag != ''
    uses: ./.github/workflows/build-mobile.yml
    with:
      platform: all
      release-tag: ${{ needs.version.outputs.mobile-tag }}
      submit: true
    secrets: inherit
    # A caller's permissions block CAPS what the called workflow may request —
    # build-mobile.yml needs id-token for Google WIF, so it must be granted here.
    permissions:
      contents: write
      id-token: write

  # If this release versioned the PUBLIC terminal package, build its inline native
  # binaries and publish to npm with provenance (OIDC). Independent of the app
  # build/submit job above — the app's flow is unchanged (still tag-only, never npm).
  # On `main` it publishes to `latest`; on the `prerelease` branch (pre mode) to the
  # `rc` dist-tag. Publish logic lives in the reusable release-npm.yml (shared with the
  # publish-terminal-canary job below), so there's ONE npm trusted-publisher binding.
  publish-terminal:
    name: Publish @fressh/react-native-terminal to npm
    needs: version
    if: needs.version.outputs.terminal-released == 'true'
    uses: ./.github/workflows/release-npm.yml
    with:
      snapshot: false
      npm-tag: ${{ github.ref_name == 'prerelease' && 'rc' || '' }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  # CANARY (snapshot): a throwaway 0.0.0-canary-<commit> of @fressh/react-native-terminal
  # on the `canary` dist-tag, built+published with provenance via the same reusable workflow.
  # Triggered by a manual dispatch or a push to the `canary` branch. Snapshot mode only
  # versions packages with a PENDING changeset, so author one first (else nothing publishes).
  # This lives HERE rather than in a separate workflow ON PURPOSE: npm allows only ONE trusted
  # publisher per package and matches it by the top-level CALLER, so EVERY npm publish (stable,
  # rc, canary) must originate from release.yml. The throwaway snapshot version is computed in
  # release-npm.yml's publish job and never committed (no Version PR, no git tag).
  publish-terminal-canary:
    name: Publish canary of @fressh/react-native-terminal to npm
    if: (github.event_name == 'workflow_dispatch' && inputs.canary) || (github.event_name == 'push' && github.ref_name == 'canary')
    uses: ./.github/workflows/release-npm.yml
    with:
      snapshot: true
      npm-tag: canary
    secrets: inherit
    permissions:
      contents: read
      id-token: write
