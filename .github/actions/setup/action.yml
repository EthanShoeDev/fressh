name: Setup
description: >-
  Standard CI setup — install Nix, load the flake devShell (so every later step
  in the job runs inside it), restore the bun cache, and install dependencies.
  The devShell env is exported via $GITHUB_ENV/$GITHUB_PATH, which propagates
  from this composite action up to the calling job's subsequent steps.

inputs:
  devshell:
    description: The flake devShell to load (passed to `nix develop`).
    required: false
    default: .#default
  install:
    description: Whether to run `bun install --frozen-lockfile`.
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    # GitHub's ubuntu runners ship ~25GB of preinstalled toolchains we never
    # touch (their Android SDK — ours comes from Nix — dotnet, Haskell, CodeQL).
    # Our jobs stack the Nix store + node_modules + two Rust workspaces; without
    # this, the disk fills mid-build and the linker dies with SIGBUS.
    - name: Free disk space (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        df -h /
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force >/dev/null 2>&1 || true
        df -h /

    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@main

    - name: Cache Nix Store
      uses: nix-community/cache-nix-action@main
      with:
        primary-key: ${{ runner.os }}-nix-${{ hashFiles('flake.lock') }}

    - name: Load devShell environment
      uses: nicknovitski/nix-develop@main
      with:
        arguments: ${{ inputs.devshell }}

    - name: Setup Bun cache
      uses: actions/cache@v3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-store-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-store-

    - name: Install dependencies
      if: inputs.install == 'true'
      shell: bash
      run: bun install --frozen-lockfile
