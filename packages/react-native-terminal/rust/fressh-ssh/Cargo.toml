[package]
name = "fressh-ssh"
version = "0.1.0"
edition = "2021"

# Binding-agnostic russh wrapper: auth, channels, byte I/O. Ported from
# packages/react-native-uniffi-russh/rust/uniffi-russh/src/{ssh_connection,
# ssh_shell,private_key}.rs with ALL uniffi annotations removed.
# See docs/projects/native-rendering-refactor.md §10.

[dependencies]
tokio = { workspace = true }
thiserror = { workspace = true }

bytes = "1.10.1"
futures = "0.3.31"
base64 = "0.22"
ed25519-dalek = "2"

# SSH client + keys. Same feature selection as uniffi-russh (ring, not aws-lc,
# to avoid the CMake toolchain requirement).
russh = { version = "0.54.3", default-features = false, features = [
	"ring",
	"flate2",
	"rsa",
] }
russh-keys = "0.49.2"

rand = "0.8"
async-trait = "0.1"

[lib]
crate-type = ["lib"]

[lints]
workspace = true
