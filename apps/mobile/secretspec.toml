[project]
name = "fressh-mobile"
revision = "1.0"

# Provider aliases (checked in -> every dev + CI runner sees them).
# The production defaults chain is ["env", "bao"]: CI sets secrets as env vars
# from GitHub Secrets (env://), and local dev reads them from our self-hosted
# OpenBao (bao). `keyring` stays defined as a no-server fallback. Requires a
# vault-capable secretspec (>= 0.10; the flake pulls it from nixpkgs-recent)
# plus VAULT auth (~/.vault-token or VAULT_TOKEN).
# See docs/projects/ci-building-and-releasing.md.
[providers]
env = "env://"
keyring = "keyring://"
bao = "openbao://bao.ethanshoe.dev/secret"

[profiles.default]
# Dev builds need none of the signing/store secrets.

# Applies to every secret in the production profile (secret-level settings
# override). See secretspec docs: concepts/profiles "Profile-Level Defaults".
[profiles.production.defaults]
providers = ["env", "bao"]

[profiles.production]
# EAS auth — required: `eas build --local` (turbo build:android/ios) authenticates
# with this to fetch managed credentials and run the build.
EXPO_TOKEN = { description = "EAS auth token", required = true }

# Android signing. NOT required with `eas build --local`'s default EAS-managed
# signing (the keystore lives on EAS — it IS the original upload keystore;
# cert fingerprint verified against a built AAB). Kept here as the self-hosted
# backup, and they become required again only if we move signing into a local
# credentials.json or use the legacy scripts/signed-build.ts gradle path.
FRESSH_ANDROID_KEYSTORE_BASE64 = { description = "base64 upload keystore", required = false }
FRESSH_ANDROID_KEYSTORE_PASSWORD = { description = "keystore (store) password", required = false }
FRESSH_ANDROID_KEY_ALIAS = { description = "signing key alias", required = false }
FRESSH_ANDROID_KEY_PASSWORD = { description = "signing key password (defaults to store password)", required = false }

# App Store Connect API key (iOS submit). Optional until iOS distribution exists.
# Only the .p8 is secret — the key ID / issuer ID / app ID are non-secret
# identifiers and live in eas.json (submit.production.ios.ascApiKey*).
# scripts/submit.ts materializes it to apps/mobile/asc-api-key.p8 at submit time.
ASC_API_KEY_P8 = { description = "App Store Connect .p8 key (verbatim contents)", required = false }

# Google Play submit (eas submit -p android, scripts/submit.ts). Verbatim
# service-account JSON, materialized to apps/mobile/google-service-account.json.
GOOGLE_SERVICE_ACCOUNT_KEY_JSON = { description = "Play Console service-account key JSON (verbatim contents)", required = false }
