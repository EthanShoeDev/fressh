[project]
name = "fressh-mobile"
revision = "1.0"

# Provider aliases (checked in -> every dev + CI runner sees them).
# The production defaults chain is ["env", "bao"]: CI sets secrets as env vars
# from GitHub Secrets (env://), and local dev reads them from our self-hosted
# OpenBao (bao). `keyring` stays defined as a no-server fallback. Requires a
# vault-capable secretspec (>= 0.10; the flake pulls it from nixpkgs-recent)
# plus VAULT auth (~/.vault-token or VAULT_TOKEN).
# See docs/projects/ci-building-and-releasing.md.
[providers]
env = "env://"
keyring = "keyring://"
bao = "openbao://bao.ethanshoe.dev/secret"

[profiles.default]
# Dev builds need none of the signing/store secrets.

# Applies to every secret in the production profile (secret-level settings
# override). See secretspec docs: concepts/profiles "Profile-Level Defaults".
[profiles.production.defaults]
providers = ["env", "bao"]

[profiles.production]
# Everything is required=false on purpose: CI steps are per-platform and only
# provide their own secrets, while `secretspec run` enforces required secrets
# PROFILE-WIDE — required=true on the android keys would fail the iOS steps.
# The scripts themselves fail loudly with pointers when a needed var is absent
# (signed-build.ts readEnv, Fastfile ENV.fetch).

# Android signing (scripts/signed-build.ts <- turbo build:android). This IS the
# Play upload keystore (the original, fingerprint-verified); values live in
# OpenBao + GitHub Secrets.
FRESSH_ANDROID_KEYSTORE_BASE64 = { description = "base64 upload keystore", required = false }
FRESSH_ANDROID_KEYSTORE_PASSWORD = { description = "keystore (store) password", required = false }
FRESSH_ANDROID_KEY_ALIAS = { description = "signing key alias", required = false }
FRESSH_ANDROID_KEY_PASSWORD = { description = "signing key password (defaults to store password)", required = false }

# iOS signing — the OpenBao twin of the Android keystore (no match repo).
# Created by `fastlane ios certs` (runbook section D); the build lane
# materializes + imports them. Optional until Apple credentials exist.
FRESSH_IOS_CERT_P12_BASE64 = { description = "base64 Apple Distribution cert + private key (.p12, passwordless)", required = false }
FRESSH_IOS_PROFILE_BASE64 = { description = "base64 App Store provisioning profile (.mobileprovision)", required = false }

# App Store Connect API key (fastlane pilot/deliver + match cert creation).
# Only the .p8 content is secret — the key/issuer IDs are non-secret and live
# in fastlane/Fastfile (ASC_KEY_ID / ASC_ISSUER_ID constants).
ASC_API_KEY_P8 = { description = "App Store Connect .p8 key (verbatim contents)", required = false }

# Google Play LOCAL-ONLY fallback. CI authenticates via Workload Identity
# Federation (google-github-actions/auth -> GOOGLE_APPLICATION_CREDENTIALS;
# the Fastfile prefers it) — no static Google key exists. Only populate this
# if a local `submit:android` ever becomes necessary.
GOOGLE_SERVICE_ACCOUNT_KEY_JSON = { description = "Play service-account key JSON (local fallback; CI uses WIF)", required = false }

# NOTE: the screenshot pipeline (scripts/screenshots.ts) deliberately needs NO
# secrets — it spins up a throwaway docker sshd and generates a per-run password in
# memory. To point the flow at an external host instead, set SCREENSHOT_SSH_HOST/
# PORT/USER/PASSWORD as plain env vars (the script reads them from the env via Config).
# Those
# are demo creds, not secrets — commit them or export them as you like; only reach for
# a secret store if a particular host's password is genuinely sensitive.
