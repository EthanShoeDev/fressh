[project]
name = "fressh-mobile"
revision = "1.0"

# Provider aliases (checked in -> every dev + CI runner sees them).
# Per-secret chains below are ["env", "bao"]: CI sets secrets as env vars from
# GitHub Secrets (env://), and local dev reads them from our self-hosted OpenBao
# (bao). `keyring` stays defined as a no-server fallback. Requires a vault-capable
# secretspec (>= 0.10; the flake pulls it from nixpkgs-recent) plus VAULT auth
# (~/.vault-token or VAULT_TOKEN). See docs/projects/ci-building-and-releasing.md.
[providers]
env = "env://"
keyring = "keyring://"
bao = "openbao://bao.ethanshoe.dev/secret"

[profiles.default]
# Dev builds need none of the signing/store secrets.

[profiles.production]
# EAS auth — required: `eas build --local` (turbo build:android/ios) authenticates
# with this to fetch managed credentials and run the build.
EXPO_TOKEN = { description = "EAS auth token", required = true, providers = ["env", "bao"] }

# Android signing. NOT required with `eas build --local`'s default EAS-managed
# signing (the keystore lives on EAS). These become required only if we move
# signing into a local credentials.json (keystore self-hosted via secretspec) or
# use the legacy scripts/signed-build.ts gradle path.
FRESSH_ANDROID_KEYSTORE_BASE64 = { description = "base64 upload keystore", required = false, providers = ["env", "bao"] }
FRESSH_ANDROID_KEYSTORE_PASSWORD = { description = "keystore (store) password", required = false, providers = ["env", "bao"] }
FRESSH_ANDROID_KEY_ALIAS = { description = "signing key alias", required = false, providers = ["env", "bao"] }
FRESSH_ANDROID_KEY_PASSWORD = { description = "signing key password (defaults to store password)", required = false, providers = ["env", "bao"] }

# App Store Connect API key (iOS submit). Optional until iOS distribution exists.
ASC_API_KEY_P8 = { description = "App Store Connect .p8 key", required = false, providers = ["env", "bao"] }
ASC_KEY_ID = { description = "ASC key id", required = false, providers = ["env", "bao"] }
ASC_ISSUER_ID = { description = "ASC issuer id", required = false, providers = ["env", "bao"] }
