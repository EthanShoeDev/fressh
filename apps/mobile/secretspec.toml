[project]
name = "fressh-mobile"
revision = "1.0"

# Provider aliases (checked in -> every dev + CI runner sees them).
# CI sets the secrets as env vars from GitHub Secrets (env://); laptops fall back
# to the OS keyring. A future self-hosted OpenBao backend would add a `bao =
# "vault://..."` alias here without touching the declarations below.
# See docs/projects/ci-building-and-releasing.md (decision #6).
[providers]
env = "env://"
keyring = "keyring://"

[profiles.default]
# Dev builds need none of the signing/store secrets.

[profiles.production]
# EAS auth (Track A). Optional until EAS is wired up.
EXPO_TOKEN = { description = "EAS auth token", required = false, providers = ["env", "keyring"] }

# Android signing (used by scripts/signed-build.ts; injected via `secretspec run`).
FRESSH_ANDROID_KEYSTORE_BASE64 = { description = "base64 upload keystore", required = true, providers = ["env", "keyring"] }
FRESSH_ANDROID_KEYSTORE_PASSWORD = { description = "keystore (store) password", required = true, providers = ["env", "keyring"] }
FRESSH_ANDROID_KEY_ALIAS = { description = "signing key alias", required = true, providers = ["env", "keyring"] }
FRESSH_ANDROID_KEY_PASSWORD = { description = "signing key password (defaults to store password)", required = false, providers = ["env", "keyring"] }

# App Store Connect API key (iOS submit). Optional until iOS distribution exists.
ASC_API_KEY_P8 = { description = "App Store Connect .p8 key", required = false, providers = ["env", "keyring"] }
ASC_KEY_ID = { description = "ASC key id", required = false, providers = ["env", "keyring"] }
ASC_ISSUER_ID = { description = "ASC issuer id", required = false, providers = ["env", "keyring"] }
